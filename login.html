<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Decuatro Catering</title>

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Supabase (SIEMPRE antes de auth.js) -->
  <script src="vendor/supabase.min.js"></script>
  <script src="js/auth.js"></script>

  <style>
    :root{
      --dc-rojo:#E1342E;
      --dc-negro:#131B23;
      --dc-blanco:#FFFFFF;
      --dc-border:#e2e8f0;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Roboto', sans-serif;
      background:
        radial-gradient(900px 500px at 20% 20%, rgba(225,52,46,.18), transparent 60%),
        radial-gradient(800px 450px at 80% 30%, rgba(225,52,46,.12), transparent 55%),
        linear-gradient(180deg, #0b0f14, #131B23);
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    /* HEADER */
    .login-header{
      padding:40px 20px 20px;
      text-align:center;
    }

    .login-header img{
      height:60px;
      object-fit:contain;
      margin-bottom:12px;
    }

    .login-header h1{
      font-family:'Oswald', sans-serif;
      color:var(--dc-blanco);
      letter-spacing:1px;
      margin:0;
    }

    /* CARD */
    .login-content{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-card{
      width:100%;
      max-width:380px;
      background:white;
      border-radius:14px;
      padding:30px;
      box-shadow:0 20px 50px rgba(0,0,0,0.3);
    }

    .login-card h2{
      font-family:'Oswald', sans-serif;
      text-align:center;
      margin-bottom:25px;
    }

    .field{
      margin-bottom:16px;
      display:flex;
      flex-direction:column;
    }

    label{
      font-size:.85rem;
      margin-bottom:6px;
      font-weight:500;
    }

    input{
      padding:12px;
      border-radius:10px;
      border:1px solid var(--dc-border);
      font-size:.95rem;
      outline:none;
    }

    input:focus{
      border-color:var(--dc-rojo);
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:var(--dc-rojo);
      color:white;
      font-family:'Oswald', sans-serif;
      letter-spacing:.5px;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn:hover{
      opacity:.9;
    }

    .msg{
      text-align:center;
      font-size:.9rem;
      margin-top:12px;
      min-height:18px;
      color:#dc2626;
    }

    .footer{
      padding:20px;
      text-align:center;
      font-size:.85rem;
      color:#94a3b8;
    }

    .login-banner{
      width:100%;
      display:block;
      line-height:0;
    }

    .login-banner img{
      width:100%;
      height:70px;
      object-fit:cover;
      object-position:center;
      display:block;
    }
  </style>
</head>

<body>

  <!-- LOGO + TÍTULO -->
  <header class="login-header">
    <img src="assets/images/logo.png" alt="Decuatro Catering">
    <h1>Decuatro Catering</h1>
  </header>

  <!-- LOGIN -->
  <main class="login-content">
    <div class="login-card">
      <h2>Iniciar sesión</h2>

      <div class="field">
        <label>Correo</label>
        <input id="email" type="email" placeholder="correo@empresa.com">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input id="password" type="password" placeholder="••••••••">
      </div>

      <button id="loginBtn" class="btn">Entrar</button>
      <div id="msg" class="msg"></div>
    </div>
  </main>

  <footer class="footer">
    Sistema interno de gestión de comandas © <span id="year"></span>
  </footer>

  <div class="login-banner">
    <img src="assets/images/Baner.JPG" alt="Decuatro Catering">
  </div>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();

  // Si ya hay sesión activa → ir a index
  document.addEventListener("DOMContentLoaded", async () => {
    if (window.Auth) {
      try {
        const u = await Auth.getUser();
        if (u) {
          console.log("Usuario ya autenticado, redirigiendo");
          window.location.href = "index.html";
        }
      } catch (e) {
        console.error("Error verificando sesión:", e);
      }
    }
  });

  const btn = document.getElementById("loginBtn");
  const msg = document.getElementById("msg");

  btn.addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;

    if (!email || !pass) {
      msg.textContent = "❌ Correo y contraseña requeridos";
      return;
    }

    msg.textContent = "";
    btn.disabled = true;
    btn.textContent = "Entrando...";

    try {
      console.log("Intentando login con:", email);
      await Auth.signIn(email, pass);
      console.log("Login exitoso, redirigiendo");
      window.location.href = "index.html";
    } catch (e) {
      console.error("LOGIN ERROR COMPLETO:", e);
      
      // Mostrar mensaje más claro
      if (e.message?.includes("Invalid login credentials")) {
        msg.textContent = "❌ Correo o contraseña incorrectos";
      } else if (e.message?.includes("Email not confirmed")) {
        msg.textContent = "❌ Por favor confirma tu correo electrónico";
      } else {
        msg.textContent = "❌ " + (e.message || "Error de conexión");
      }
    } finally {
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  });
</script>

</body>
</html>
